# ============================================
# BraidedByMae — Docker Compose (Production)
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  # --- Next.js App (Production) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
    container_name: braidedbymae-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - braidedbymae
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # --- PostgreSQL ---
  db:
    image: postgres:16-alpine
    container_name: braidedbymae-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - braidedbymae
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: braidedbymae-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - braidedbymae

volumes:
  pgdata:
    driver: local

networks:
  braidedbymae:
    driver: bridge
